<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sistema inteligente de reportes ciudadanos.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="reportes_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>reportes_ai</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="maps_api.js"></script>

  <script>
    window.__googleMapsReady = false;
    window.__initGoogleMaps = function () {
      window.__googleMapsReady = true;
    };

    if (window.GOOGLE_MAPS_API_KEY) {
      const script = document.createElement('script');
      script.src =
        'https://maps.googleapis.com/maps/api/js?key=' +
        window.GOOGLE_MAPS_API_KEY +
        '&callback=__initGoogleMaps';
      script.async = true;
      script.defer = true;
      document.head.appendChild(script);
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
